<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Retail — Store Intelligence</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #252836;
    --text: #e8eaf0; --text2: #9ca3b0; --accent: #6c63ff;
    --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
  header {
    padding: 16px 24px; background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; }
  #last-update { font-size: 12px; color: var(--text2); }
  .store-selector { display: flex; gap: 8px; padding: 16px 24px; }
  .store-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 13px;
  }
  .store-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; padding: 0 24px 16px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .card-value { font-size: 32px; font-weight: 700; color: var(--text); }
  .card-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .section { padding: 0 24px 24px; }
  .section h2 { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .funnel { display: flex; flex-direction: column; gap: 8px; }
  .funnel-row { display: flex; align-items: center; gap: 12px; }
  .funnel-label { width: 130px; font-size: 13px; color: var(--text2); }
  .funnel-bar-wrap { flex: 1; height: 28px; background: var(--bg3); border-radius: 6px; overflow: hidden; }
  .funnel-bar { height: 100%; background: var(--accent); border-radius: 6px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 10px; font-size: 12px; font-weight: 600; min-width: 40px; }
  .funnel-drop { width: 60px; font-size: 12px; color: var(--red); text-align: right; }
  .heatmap { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .heatmap-cell {
    border-radius: 8px; padding: 14px 12px; text-align: center;
    transition: background 0.6s ease;
  }
  .heatmap-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .heatmap-freq { font-size: 20px; font-weight: 700; }
  .heatmap-dwell { font-size: 11px; margin-top: 4px; opacity: 0.8; }
  .anomaly-list { display: flex; flex-direction: column; gap: 8px; }
  .anomaly-item { background: var(--bg3); border-radius: 8px; padding: 12px 16px; display: flex; gap: 12px; align-items: flex-start; border-left: 3px solid var(--border); }
  .anomaly-item.CRITICAL { border-left-color: var(--red); }
  .anomaly-item.WARN     { border-left-color: var(--amber); }
  .anomaly-item.INFO     { border-left-color: var(--accent); }
  .anomaly-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; margin-top: 2px; }
  .badge-CRITICAL { background: rgba(239,68,68,0.2); color: var(--red); }
  .badge-WARN     { background: rgba(245,158,11,0.2); color: var(--amber); }
  .badge-INFO     { background: rgba(108,99,255,0.2); color: var(--accent); }
  .anomaly-text { flex: 1; }
  .anomaly-desc   { font-size: 13px; margin-bottom: 4px; }
  .anomaly-action { font-size: 12px; color: var(--text2); }
  .no-data { font-size: 13px; color: var(--text2); padding: 16px 0; }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<header>
  <h1><span id="status-dot"></span>Apex Retail · Store Intelligence</h1>
  <span id="last-update">Connecting…</span>
</header>

<div class="store-selector" id="store-selector"></div>

<div class="grid" id="metrics-grid">
  <div class="card"><div class="card-label">Unique Visitors</div><div class="card-value pulse" id="m-visitors">—</div><div class="card-sub">Today</div></div>
  <div class="card"><div class="card-label">Conversion Rate</div><div class="card-value pulse" id="m-conversion">—</div><div class="card-sub">Visitors → Purchase</div></div>
  <div class="card"><div class="card-label">Queue Depth</div><div class="card-value pulse" id="m-queue">—</div><div class="card-sub">Billing now</div></div>
  <div class="card"><div class="card-label">Abandonment Rate</div><div class="card-value pulse" id="m-abandon">—</div><div class="card-sub">Left billing without buying</div></div>
</div>

<div class="section">
  <h2>Conversion Funnel</h2>
  <div class="funnel" id="funnel"></div>
</div>

<div class="section">
  <h2>Zone Heatmap</h2>
  <div class="heatmap" id="heatmap"></div>
</div>

<div class="section">
  <h2>Active Anomalies</h2>
  <div class="anomaly-list" id="anomalies"></div>
</div>

<script>
const API = '';
const STORES = ['ST1008'];
let activeStore = STORES[1]; // default to STORE_BLR_002

function heatColor(score) {
  const r = Math.round(30 + (score / 100) * 160);
  const g = Math.round(20 + (score / 100) * 40);
  const b = Math.round(80 - (score / 100) * 40);
  return `rgba(${r},${g},${b},0.85)`;
}

function buildStoreBtns() {
  const sel = document.getElementById('store-selector');
  sel.innerHTML = STORES.map(s =>
    `<button class="store-btn ${s===activeStore?'active':''}" onclick="selectStore('${s}')">${s}</button>`
  ).join('');
}

function selectStore(id) {
  activeStore = id;
  buildStoreBtns();
  refresh();
}

async function fetchJSON(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function refresh() {
  try {
    const [metrics, funnel, heatmap, anomalies] = await Promise.all([
      fetchJSON(`/stores/${activeStore}/metrics`),
      fetchJSON(`/stores/${activeStore}/funnel`),
      fetchJSON(`/stores/${activeStore}/heatmap`),
      fetchJSON(`/stores/${activeStore}/anomalies`),
    ]);

    // Metrics
    document.getElementById('m-visitors').textContent   = metrics.unique_visitors;
    document.getElementById('m-conversion').textContent = (metrics.conversion_rate * 100).toFixed(1) + '%';
    document.getElementById('m-queue').textContent      = metrics.queue_depth;
    document.getElementById('m-abandon').textContent    = (metrics.abandonment_rate * 100).toFixed(1) + '%';
    document.querySelectorAll('.card-value').forEach(el => el.classList.remove('pulse'));

    // Funnel
    const maxCount = funnel.stages[0]?.count || 1;
    document.getElementById('funnel').innerHTML = funnel.stages.map(s => `
      <div class="funnel-row">
        <span class="funnel-label">${s.stage}</span>
        <div class="funnel-bar-wrap">
          <div class="funnel-bar" style="width:${Math.max(5, (s.count/maxCount)*100)}%">${s.count}</div>
        </div>
        <span class="funnel-drop">${s.drop_off_pct > 0 ? '-'+s.drop_off_pct+'%' : ''}</span>
      </div>
    `).join('');

    // Heatmap
    document.getElementById('heatmap').innerHTML = heatmap.zones.length
      ? heatmap.zones.map(z => `
          <div class="heatmap-cell" style="background:${heatColor(z.visit_frequency)}">
            <div class="heatmap-name">${z.zone_id}</div>
            <div class="heatmap-freq">${z.visit_frequency.toFixed(0)}</div>
            <div class="heatmap-dwell">${(z.avg_dwell_ms/1000).toFixed(0)}s dwell</div>
          </div>`).join('')
      : '<p class="no-data">No zone data yet</p>';

    // Anomalies
    document.getElementById('anomalies').innerHTML = anomalies.anomalies.length
      ? anomalies.anomalies.map(a => `
          <div class="anomaly-item ${a.severity}">
            <span class="anomaly-badge badge-${a.severity}">${a.severity}</span>
            <div class="anomaly-text">
              <div class="anomaly-desc">${a.description}</div>
              <div class="anomaly-action">→ ${a.suggested_action}</div>
            </div>
          </div>`).join('')
      : '<p class="no-data">No active anomalies</p>';

    document.getElementById('status-dot').style.background = '#22c55e';
    document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString();

  } catch(e) {
    document.getElementById('status-dot').style.background = '#ef4444';
    document.getElementById('last-update').textContent = 'Connection error — retrying…';
  }
}

buildStoreBtns();
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
